<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Deposit</title>

<style>

body{
font-family:Arial;
background:#edf3ff;
padding:20px;
}

.card{

background:white;
padding:20px;
border-radius:15px;

}

input,select,button{

width:100%;
padding:15px;
margin-top:10px;
border-radius:10px;

}

button{

background:#1877f2;
color:white;
border:none;

}

</style>

</head>

<body>

<div class="card">

<h2>Deposit Funds</h2>

<input
id="amount"
type="number"
placeholder="Amount in USD">

<select id="method">

<option>Bitcoin</option>
<option>Bank Transfer</option>
<option>Card Payment</option>

</select>

<button id="depositBtn">

Submit Deposit

</button>

</div>

<script
type="module"
src="deposit.js">
</script>

</body>
</html>
