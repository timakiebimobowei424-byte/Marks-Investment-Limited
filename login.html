<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Mark's Investment Limited</title>

<style>
body {
margin: 0;
font-family: Arial;
background: #0f172a;
color: white;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
}

.container {
background: #111827;
padding: 25px;
border-radius: 10px;
width: 320px;
}

h2 {
text-align: center;
margin-bottom: 20px;
}

input {
width: 100%;
padding: 10px;
margin: 8px 0;
border: none;
border-radius: 5px;
}

button {
width: 100%;
padding: 10px;
margin-top: 10px;
background: #22c55e;
border: none;
color: white;
border-radius: 5px;
cursor: pointer;
}

a {
display: block;
text-align: center;
margin-top: 10px;
color: #60a5fa;
cursor: pointer;
text-decoration: none;
}

</style>
</head>

<body>

<div class="container">

<h2>Login</h2>

<input type="email" id="loginEmail" placeholder="Enter Email">

<input type="password" id="loginPassword" placeholder="Enter Password">

<button id="loginBtn">Login</button>

<a id="forgotPassword">Forgot Password?</a>

</div>

<!-- Firebase Login Script -->
<script type="module" src="login.js"></script>

</body>
</html>
