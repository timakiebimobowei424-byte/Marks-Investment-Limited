<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mark's Investment Limited</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <div class="logo">Mark's Investment Limited</div>
  <button id="openRegister">Open Account</button>
</header>

<section class="hero">
  <div class="overlay">
    <h1>Invest Smart. Grow Faster.</h1>
    <p>Secure investment platform for global financial growth.</p>
    <button id="heroRegister">Get Started</button>
  </div>
</section>

<!-- POPUP REGISTER FORM -->
<div id="registerModal" class="modal">
  <div class="modal-content">

    <span id="closeModal">&times;</span>

    <h2>Create Account</h2>

    <input type="text" id="fullname" placeholder="Full Name">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button id="registerBtn">Create Account</button>

  </div>
</div>

<script type="module" src="auth.js"></script>
<script src="script.js"></script>

</body>
</html>
