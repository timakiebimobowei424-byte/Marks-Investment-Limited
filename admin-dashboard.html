<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin Dashboard</title><style>*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}body{background:#081120;color:white;padding:20px}h1 span{color:#22c55e}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;margin-top:25px}.card{background:rgba(17,24,39,.95);padding:25px;border-radius:20px}.num{font-size:30px;color:#22c55e;margin-top:10px}.actions{margin-top:30px;display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px}.btn{background:#22c55e;color:white;text-decoration:none;padding:16px;border-radius:14px;text-align:center;display:block}</style></head><body><h1>FastCash <span>Admin Dashboard</span></h1><div class="grid"><div class="card"><h3>Total Users</h3><div class="num" id="users">0</div></div><div class="card"><h3>Pending Deposits</h3><div class="num" id="deposits">0</div></div><div class="card"><h3>Pending Withdrawals</h3><div class="num" id="withdrawals">0</div></div><div class="card"><h3>Total Transactions</h3><div class="num" id="transactions">0</div></div></div><div class="actions"><a class="btn" href="users.html">Users</a><a class="btn" href="fund-user.html">Fund User</a><a class="btn" href="deposits.html">Deposits</a><a class="btn" href="withdrawals.html">Withdrawals</a><a class="btn" href="transactions.html">Transactions</a><a class="btn" href="login.html">Logout</a></div><script type="module">import { db } from './config.js'; import { collection,getDocs,query,where } from 'https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js'; async function load(){try{document.getElementById('users').innerText=(await getDocs(collection(db,'users'))).size;document.getElementById('transactions').innerText=(await getDocs(collection(db,'transactions'))).size;document.getElementById('deposits').innerText=(await getDocs(query(collection(db,'deposits'),where('status','==','pending')))).size;document.getElementById('withdrawals').innerText=(await getDocs(query(collection(db,'withdrawals'),where('status','==','pending')))).size;}catch(e){console.log(e)}} load();</script></body></html>
