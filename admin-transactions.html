<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Transactions - FastCash Crypto</title><style>*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}body{background:#081120;color:white;padding:20px}h1{margin-bottom:20px}.card{background:#111827;padding:18px;border-radius:15px;margin-bottom:12px}</style></head><body><h1>Transactions</h1><div id="container">Loading...</div><script type="module">import {db} from './config.js';import {collection,getDocs,orderBy,query} from 'https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js';const container=document.getElementById('container');async function load(){try{const q=query(collection(db,'transactions'),orderBy('date','desc'));const snap=await getDocs(q);container.innerHTML='';if(snap.empty){container.innerHTML='No transactions found';return;}snap.forEach((d)=>{const data=d.data();container.innerHTML+=`<div class='card'><p><b>User:</b> ${data.email||data.uid||'Unknown'}</p><p><b>Type:</b> ${data.type||'Unknown'}</p><p><b>Amount:</b> $${data.amount||0}</p><p><b>Status:</b> ${data.status||'Completed'}</p></div>`})}catch(e){container.innerHTML='Error loading transactions';console.log(e)}}load();</script></body></html>
