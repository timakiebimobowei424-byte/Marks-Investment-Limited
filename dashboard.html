<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<style>
body {
margin: 0;
font-family: Arial;
background: #0b1220;
color: white;
}

.sidebar {
width: 220px;
height: 100vh;
position: fixed;
background: #111827;
padding: 20px;
}

.sidebar h2 {
color: #22c55e;
}

.sidebar a {
display: block;
color: #94a3b8;
padding: 10px 0;
text-decoration: none;
}

.main {
margin-left: 240px;
padding: 20px;
}

.topbar {
display: flex;
justify-content: space-between;
background: #111827;
padding: 15px;
border-radius: 10px;
}

.cards {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
gap: 15px;
margin-top: 20px;
}

.card {
background: #111827;
padding: 20px;
border-radius: 10px;
border: 1px solid #1f2937;
}

.actions {
margin-top: 20px;
display: flex;
gap: 10px;
}

button {
padding: 10px;
border: none;
border-radius: 8px;
cursor: pointer;
}

.deposit { background: #22c55e; color: white; }
.withdraw { background: #ef4444; color: white; }
.logout { background: transparent; border: 1px solid white; color: white; }

.modal {
display: none;
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(0,0,0,0.7);
}

.modal-content {
background: white;
color: black;
width: 320px;
margin: 120px auto;
padding: 20px;
border-radius: 10px;
}

input {
width: 100%;
padding: 10px;
margin-top: 10px;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>MARK INVEST</h2>
<a href="#">Dashboard</a>
<a href="#">Transactions</a>
<a href="#">Investments</a>
</div>

<div class="main">

<div class="topbar">
<div>Dashboard</div>
<div id="userEmail">Loading...</div>
</div>

<div class="cards">
<div class="card">
<h3 id="balance">₦0</h3>
<p>Balance</p>
</div>

<div class="card">
<h3 id="profit">₦0</h3>
<p>Profit</p>
</div>

<div class="card">
<h3 id="invested">₦0</h3>
<p>Invested</p>
</div>
</div>

<div class="actions">
<button class="deposit" id="depositBtn">Deposit</button>
<button class="withdraw" id="withdrawBtn">Withdraw</button>
<button class="logout" id="logoutBtn">Logout</button>
</div>

</div>

<!-- DEPOSIT MODAL -->
<div class="modal" id="depositModal">
<div class="modal-content">
<h3>Deposit Method</h3>

<button onclick="openBitcoin()">Bitcoin</button>
<button onclick="openCard()">Card</button>

</div>
</div>

<!-- BITCOIN -->
<div class="modal" id="bitcoinModal">
<div class="modal-content">
<h3>Bitcoin Deposit</h3>

<input type="text" id="btcAddress" value="bc1qq0phsp53j20svznj8e9sy0cwqytqfh99e3jvts " readonly>

<button onclick="copyBTC()">Copy</button>
<button id="btcConfirm">I Paid</button>

</div>
</div>

<!-- CARD -->
<div class="modal" id="cardModal">
<div class="modal-content">
<h3>Card Deposit</h3>

<input type="number" id="cardAmount" placeholder="Amount">
<button id="cardPay">Pay</button>

</div>
</div>

<script type="module" src="dashboard.js"></script>

</body>
</html>
