<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard - Mark's Investment Limited</title>

<style>
body {
margin: 0;
font-family: Arial;
background: #0b1220;
color: white;
}

/* TOP BAR */
header {
display: flex;
justify-content: space-between;
align-items: center;
padding: 15px 20px;
background: #111827;
border-bottom: 1px solid #1f2937;
}

.logo {
font-weight: bold;
color: #facc15;
}

.user {
font-size: 14px;
color: #cbd5e1;
}

/* GRID */
.container {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
gap: 15px;
padding: 20px;
}

/* CARDS */
.card {
background: #111827;
padding: 20px;
border-radius: 10px;
border: 1px solid #1f2937;
}

.card h2 {
margin: 0;
font-size: 20px;
color: #22c55e;
}

.card p {
color: #94a3b8;
}

/* ACTIONS */
.actions {
display: flex;
gap: 10px;
flex-wrap: wrap;
padding: 20px;
}

button {
padding: 10px 15px;
border: none;
border-radius: 6px;
cursor: pointer;
font-weight: bold;
}

.deposit {
background: #22c55e;
color: white;
}

.withdraw {
background: #ef4444;
color: white;
}

.logout {
background: transparent;
border: 1px solid white;
color: white;
}

/* MODAL */
.modal {
display: none;
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(0,0,0,0.7);
}

.modal-content {
background: white;
color: black;
width: 300px;
margin: 120px auto;
padding: 20px;
border-radius: 10px;
}

input {
width: 100%;
padding: 10px;
margin-top: 10px;
}

.modal button {
margin-top: 10px;
width: 100%;
}
</style>
</head>

<body>

<header>
<div class="logo">Dashboard</div>
<div class="user" id="userEmail">Loading...</div>
</header>

<!-- BALANCE CARDS -->
<div class="container">

<div class="card">
<h2 id="balance">₦0</h2>
<p>Balance</p>
</div>

<div class="card">
<h2 id="profit">₦0</h2>
<p>Profit</p>
</div>

<div class="card">
<h2 id="invested">₦0</h2>
<p>Invested</p>
</div>

</div>

<!-- ACTION BUTTONS -->
<div class="actions">
<button class="deposit" id="depositBtn">Deposit</button>
<button class="withdraw" id="withdrawBtn">Withdraw</button>
<button class="logout" id="logoutBtn">Logout</button>
</div>

<!-- DEPOSIT MODAL -->
<div class="modal" id="depositModal">
<div class="modal-content">
<h3>Deposit Funds</h3>
<input type="number" id="depositAmount" placeholder="Enter amount">
<button id="confirmDeposit">Confirm Deposit</button>
</div>
</div>

<!-- WITHDRAW MODAL -->
<div class="modal" id="withdrawModal">
<div class="modal-content">
<h3>Withdraw Funds</h3>
<input type="number" id="withdrawAmount" placeholder="Enter amount">
<button id="confirmWithdraw">Confirm Withdraw</button>
</div>
</div>

<script type="module" src="dashboard.js"></script>

</body>
</html>
